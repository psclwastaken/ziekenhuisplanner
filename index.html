<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ziekenhuis Bezoek Planner</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/login.js" defer></script>
</head>

<body>

<div class="login-container">

    <h1>🏥 Bezoekplanner</h1>

    <p>
        Vul het familie wachtwoord in
    </p>

    <input 
        id="password"
        type="password"
        placeholder="Wachtwoord">


    <button onclick="login()">
        Open agenda
    </button>

    <button onclick="(function(){ sessionStorage.removeItem('authenticated'); window.location.href='calendar.html'; })()">
        Bekijk zonder wachtwoord
    </button>


    <p id="error"></p>
    
<footer id="footer">
v<span id="version">1.1.0</span>
</footer>

</div>


</body>
</html>
